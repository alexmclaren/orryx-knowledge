# Persona Selection Rules
selection_rules:
  mandatory_persona:
    description: "Every Claude session MUST include exactly one persona flag"
    enforcement: strict
    error_handling: "reject_session"
    validation_pattern: "^--persona-[a-z]+$"
  
  context_matching:
    description: "Persona must match task context and complexity"
    rules:
      architecture_tasks: ["architect", "backend", "fullstack"]
      security_tasks: ["security", "qa"]
      frontend_tasks: ["frontend", "fullstack"]
      testing_tasks: ["qa", "security"]
      deployment_tasks: ["devops", "architect"]
      data_tasks: ["data", "backend"]
      business_tasks: ["business", "frontend"]
  
  cross_persona_consultation:
    description: "Multiple personas allowed only with explicit flagging"
    pattern: "--persona-primary --consult-persona-secondary"
    max_personas: 2
    primary_required: true

# Persona Collaboration Patterns
collaboration_patterns:
  architect_security:
    use_case: "Secure system design"
    primary: "architect"
    secondary: "security"
    commands: ["design", "security", "validate"]
  
  devops_security:
    use_case: "Secure deployment pipelines"
    primary: "devops"
    secondary: "security"
    commands: ["deploy", "security", "monitor"]
  
  frontend_backend:
    use_case: "Full-stack application development"
    primary: "fullstack"
    secondary: ["frontend", "backend"]
    commands: ["build", "design", "test"]
  
  qa_security:
    use_case: "Security testing and validation"
    primary: "qa"
    secondary: "security"
    commands: ["test", "validate", "analyze"]
  
  business_data:
    use_case: "Data-driven business insights"
    primary: "business"
    secondary: "data"
    commands: ["analyze", "document", "plan"]

# Persona Evolution and Learning
evolution_rules:
  capability_expansion:
    description: "Personas can expand capabilities based on successful patterns"
    tracking_metrics:
      - success_rate
      - user_satisfaction
      - collaboration_effectiveness
      - output_quality
  
  specialization_refinement:
    description: "Personas can refine specializations based on usage patterns"
    adaptation_triggers:
      - frequent_command_usage
      - successful_collaboration_patterns
      - emerging_technology_trends
      - user_feedback_patterns