anti_patterns_identified:
- anti_pattern: Skip baseline creation in RALPH loop
  description: Starting with optimized implementation without baseline
  consequence: No comparison point, cannot measure improvement
  correct_approach: Always create intentionally slow baseline first
  evidence: TP-2026-002 validated baseline → optimize approach

- anti_pattern: Casual --force usage
  description: Using --force without comprehensive justification
  consequence: Quality degradation, loss of standards
  correct_approach: Use --force only with detailed justification and manual review
  evidence: Phase 2 used --force appropriately with full transparency

- anti_pattern: Iterate without measurement
  description: Applying optimizations without verifying results
  consequence: No learning, cannot validate effectiveness
  correct_approach: Measure actual results, compare to hypothesis
  evidence: TP-2026-002 documented performance improvements

